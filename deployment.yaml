apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/backend_repo
        ports:
        - containerPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/frontend_repo
        ports:
        - containerPort: 80