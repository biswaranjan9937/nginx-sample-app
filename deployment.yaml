apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/backend_repo:fc1c830cc444b8d0b10c42364fa5f086e13bb7f6
        ports:
        - containerPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/frontend_repo:fc1c830cc444b8d0b10c42364fa5f086e13bb7f6
        ports:
        - containerPort: 80
