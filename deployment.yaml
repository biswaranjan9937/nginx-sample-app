apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/backend_repo:e5c4e5b4ed6accf32d7c26e5e1724e10124a59db
        ports:
        - containerPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 793524670633.dkr.ecr.ap-south-1.amazonaws.com/frontend_repo:e5c4e5b4ed6accf32d7c26e5e1724e10124a59db
        ports:
        - containerPort: 80
