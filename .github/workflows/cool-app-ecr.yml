name: Build and Push Cool App Images

on:
  push:
    branches:
      - main
    paths:
      - "cool-app/backend/server.js"
      - "cool-app/backend/Dockerfile"
      - "cool-app/frontend/vite.config.js"
      - "cool-app/frontend/index.html"
      - "cool-app/frontend/Dockerfile" 
      - "cool-app/frontend/src/main.jsx"
      - "cool-app/frontend/src/App.jsx" 
      - "cool-app/frontend/src/styles.css"
      - ".github/workflows/cool-app-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
  ECR_BACKEND_REPO: ${{ vars.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ vars.ECR_FRONTEND_REPO }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in AWS_REGION ROLE_TO_ASSUME ECR_BACKEND_REPO ECR_FRONTEND_REPO; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required repo variable: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Set repository variables in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in "$ECR_BACKEND_REPO" "$ECR_FRONTEND_REPO"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Build and push backend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ./cool-app/backend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ./cool-app/frontend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest

      - name: Update deployment manifests
        run: |
          # Update backend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}|g" deployment.yaml
          
          # Update frontend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}|g" deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add deployment.yaml
          git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
          git push
          git status

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Scan backend image with Trivy
        run: |
          mkdir -p trivy-reports
          trivy image --format table \
            --output trivy-reports/backend-report.txt \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          
          trivy image --format json \
            --output trivy-reports/backend-report.json \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}

      - name: Scan frontend image with Trivy
        run: |
          trivy image --format table \
            --output trivy-reports/frontend-report.txt \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          
          trivy image --format json \
            --output trivy-reports/frontend-report.json \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}

      - name: Convert reports to HTML
        run: |
          # Convert backend report to HTML
          cat > trivy-reports/backend-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Backend Security Report</title>
              <style>
                  body { font-family: monospace; margin: 20px; background: #f5f5f5; }
                  .container { background: white; padding: 20px; border-radius: 5px; }
                  pre { background: #f8f8f8; padding: 15px; border-radius: 3px; overflow-x: auto; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Backend Image Security Report</h1>
                  <pre>
          EOF
          cat trivy-reports/backend-report.txt >> trivy-reports/backend-report.html
          cat >> trivy-reports/backend-report.html << 'EOF'
                  </pre>
              </div>
          </body>
          </html>
          EOF
          
          # Convert frontend report to HTML
          cat > trivy-reports/frontend-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Frontend Security Report</title>
              <style>
                  body { font-family: monospace; margin: 20px; background: #f5f5f5; }
                  .container { background: white; padding: 20px; border-radius: 5px; }
                  pre { background: #f8f8f8; padding: 15px; border-radius: 3px; overflow-x: auto; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Frontend Image Security Report</h1>
                  <pre>
          EOF
          cat trivy-reports/frontend-report.txt >> trivy-reports/frontend-report.html
          cat >> trivy-reports/frontend-report.html << 'EOF'
                  </pre>
              </div>
          </body>
          </html>
          EOF

      - name: Create index page for reports
        run: |
          cat > trivy-reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Trivy Security Reports - Build ${{ github.sha }}</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  .container { max-width: 800px; margin: 0 auto; }
                  .report-link { display: block; padding: 15px; margin: 10px 0; background: #f5f5f5; text-decoration: none; border-radius: 5px; }
                  .report-link:hover { background: #e5e5e5; }
                  .build-info { background: #e8f4fd; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Trivy Security Scan Reports</h1>
                  <div class="build-info">
                      <strong>Build:</strong> ${{ github.sha }}<br>
                      <strong>Date:</strong> $(date)<br>
                      <strong>Repository:</strong> ${{ github.repository }}
                  </div>
                  <h2>Available Reports:</h2>
                  <a href="backend-report.html" class="report-link">
                      <strong>Backend Image Security Report</strong><br>
                      <small>Vulnerability scan for backend Docker image</small>
                  </a>
                  <a href="frontend-report.html" class="report-link">
                      <strong>Frontend Image Security Report</strong><br>
                      <small>Vulnerability scan for frontend Docker image</small>
                  </a>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./trivy-reports
          destination_dir: reports/${{ github.sha }}

      - name: Output report URLs
        run: |
          echo "📊 Trivy Security Reports Available:"
          echo "🔗 Main Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/"
          echo "🔗 Backend Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/backend-report.html"
          echo "🔗 Frontend Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/frontend-report.html"


