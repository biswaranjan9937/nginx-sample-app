name: Build and Push Cool App Images

on:
  push:
    branches:
      - main
    paths:
      - "cool-app/backend/server.js"
      - "cool-app/backend/Dockerfile"
      - "cool-app/frontend/vite.config.js"
      - "cool-app/frontend/index.html"
      - "cool-app/frontend/Dockerfile" 
      - "cool-app/frontend/src/main.jsx"
      - "cool-app/frontend/src/App.jsx" 
      - "cool-app/frontend/src/styles.css"
      - ".github/workflows/cool-app-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
  ECR_BACKEND_REPO: ${{ vars.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ vars.ECR_FRONTEND_REPO }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in AWS_REGION ROLE_TO_ASSUME ECR_BACKEND_REPO ECR_FRONTEND_REPO; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required repo variable: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Set repository variables in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in "$ECR_BACKEND_REPO" "$ECR_FRONTEND_REPO"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Build and push backend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ./cool-app/backend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ./cool-app/frontend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest

      - name: Update deployment manifests
        run: |
          # Update backend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}|g" deployment.yaml
          
          # Update frontend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}|g" deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add deployment.yaml
          git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
          git push
          git status

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Scan backend image with Trivy
        run: |
          mkdir -p trivy-reports
          trivy image --format table \
            --output trivy-reports/backend-report.txt \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          
          trivy image --format json \
            --output trivy-reports/backend-report.json \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}

      - name: Scan frontend image with Trivy
        run: |
          trivy image --format table \
            --output trivy-reports/frontend-report.txt \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          
          trivy image --format json \
            --output trivy-reports/frontend-report.json \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}

      - name: Convert reports to HTML
        run: |
          # Create colorful HTML report generator script
          cat > generate_html_report.py << 'EOF'
          import json
          import sys
          import html
          from datetime import datetime
          
          def generate_html_report(json_file, output_file, title):
              with open(json_file, 'r') as f:
                  data = json.load(f)
              
              # Count vulnerabilities by severity
              severity_counts = {'CRITICAL': 0, 'HIGH': 0, 'MEDIUM': 0, 'LOW': 0, 'UNKNOWN': 0}
              total_vulns = 0
              
              results = data.get('Results', [])
              for result in results:
                  vulnerabilities = result.get('Vulnerabilities', [])
                  for vuln in vulnerabilities:
                      severity = vuln.get('Severity', 'UNKNOWN')
                      severity_counts[severity] = severity_counts.get(severity, 0) + 1
                      total_vulns += 1
              
              html_content = f'''
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{title} - Security Report</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{ font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }}
                  .container {{ max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }}
                  .header {{ background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 30px; text-align: center; }}
                  .header h1 {{ font-size: 2.5em; margin-bottom: 10px; }}
                  .header p {{ opacity: 0.9; font-size: 1.1em; }}
                  .summary {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 30px; background: #f8f9fa; }}
                  .summary-card {{ background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: transform 0.3s; }}
                  .summary-card:hover {{ transform: translateY(-5px); }}
                  .summary-card h3 {{ font-size: 2em; margin-bottom: 5px; }}
                  .critical {{ color: #e74c3c; border-left: 5px solid #e74c3c; }}
                  .high {{ color: #f39c12; border-left: 5px solid #f39c12; }}
                  .medium {{ color: #f1c40f; border-left: 5px solid #f1c40f; }}
                  .low {{ color: #27ae60; border-left: 5px solid #27ae60; }}
                  .unknown {{ color: #95a5a6; border-left: 5px solid #95a5a6; }}
                  .total {{ color: #3498db; border-left: 5px solid #3498db; }}
                  .content {{ padding: 30px; }}
                  .vulnerability {{ background: #f8f9fa; margin: 15px 0; padding: 20px; border-radius: 8px; border-left: 5px solid #ddd; }}
                  .vuln-header {{ display: flex; justify-content: between; align-items: center; margin-bottom: 15px; }}
                  .vuln-title {{ font-size: 1.2em; font-weight: bold; flex: 1; }}
                  .severity-badge {{ padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9em; }}
                  .severity-critical {{ background: #e74c3c; }}
                  .severity-high {{ background: #f39c12; }}
                  .severity-medium {{ background: #f1c40f; color: #333; }}
                  .severity-low {{ background: #27ae60; }}
                  .severity-unknown {{ background: #95a5a6; }}
                  .vuln-details {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }}
                  .detail-item {{ background: white; padding: 15px; border-radius: 5px; }}
                  .detail-label {{ font-weight: bold; color: #2c3e50; margin-bottom: 5px; }}
                  .no-vulns {{ text-align: center; padding: 50px; color: #27ae60; }}
                  .no-vulns i {{ font-size: 4em; margin-bottom: 20px; display: block; }}
                  .package-info {{ background: #e8f4fd; padding: 15px; border-radius: 5px; margin-bottom: 15px; }}
                  .footer {{ background: #2c3e50; color: white; text-align: center; padding: 20px; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🛡️ {title}</h1>
                      <p>Security Vulnerability Report - Generated on {datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC")}</p>
                  </div>
                  
                  <div class="summary">
                      <div class="summary-card total">
                          <h3>{total_vulns}</h3>
                          <p>Total Vulnerabilities</p>
                      </div>
                      <div class="summary-card critical">
                          <h3>{severity_counts['CRITICAL']}</h3>
                          <p>Critical</p>
                      </div>
                      <div class="summary-card high">
                          <h3>{severity_counts['HIGH']}</h3>
                          <p>High</p>
                      </div>
                      <div class="summary-card medium">
                          <h3>{severity_counts['MEDIUM']}</h3>
                          <p>Medium</p>
                      </div>
                      <div class="summary-card low">
                          <h3>{severity_counts['LOW']}</h3>
                          <p>Low</p>
                      </div>
                  </div>
                  
                  <div class="content">
          '''
              
              if total_vulns == 0:
                  html_content += '''
                      <div class="no-vulns">
                          <i>✅</i>
                          <h2>No Vulnerabilities Found!</h2>
                          <p>This image appears to be secure with no known vulnerabilities.</p>
                      </div>
                  '''
              else:
                  for result in results:
                      target = result.get('Target', 'Unknown')
                      vulnerabilities = result.get('Vulnerabilities', [])
                      
                      if vulnerabilities:
                          html_content += f'<div class="package-info"><strong>📦 Target:</strong> {html.escape(target)}</div>'
                          
                          for vuln in vulnerabilities:
                              severity = vuln.get('Severity', 'UNKNOWN').lower()
                              vuln_id = vuln.get('VulnerabilityID', 'N/A')
                              pkg_name = vuln.get('PkgName', 'N/A')
                              installed_version = vuln.get('InstalledVersion', 'N/A')
                              fixed_version = vuln.get('FixedVersion', 'Not Available')
                              title = vuln.get('Title', 'No title available')
                              description = vuln.get('Description', 'No description available')
                              
                              html_content += f'''
                              <div class="vulnerability">
                                  <div class="vuln-header">
                                      <div class="vuln-title">{html.escape(vuln_id)} - {html.escape(pkg_name)}</div>
                                      <span class="severity-badge severity-{severity}">{severity.upper()}</span>
                                  </div>
                                  <div class="vuln-details">
                                      <div class="detail-item">
                                          <div class="detail-label">Package</div>
                                          <div>{html.escape(pkg_name)}</div>
                                      </div>
                                      <div class="detail-item">
                                          <div class="detail-label">Installed Version</div>
                                          <div>{html.escape(installed_version)}</div>
                                      </div>
                                      <div class="detail-item">
                                          <div class="detail-label">Fixed Version</div>
                                          <div>{html.escape(fixed_version)}</div>
                                      </div>
                                      <div class="detail-item">
                                          <div class="detail-label">Title</div>
                                          <div>{html.escape(title)}</div>
                                      </div>
                                  </div>
                                  <div style="margin-top: 15px; padding: 15px; background: white; border-radius: 5px;">
                                      <div class="detail-label">Description</div>
                                      <div>{html.escape(description)}</div>
                                  </div>
                              </div>
                              '''
              
              html_content += '''
                  </div>
                  <div class="footer">
                      <p>Generated by Trivy Security Scanner | Report created with ❤️</p>
                  </div>
              </div>
          </body>
          </html>
              '''
              
              with open(output_file, 'w') as f:
                  f.write(html_content)
          
          if __name__ == "__main__":
              generate_html_report(sys.argv[1], sys.argv[2], sys.argv[3])
          EOF
          
          # Generate colorful HTML reports
          python3 generate_html_report.py trivy-reports/backend-report.json trivy-reports/backend-report.html "Backend Image"
          python3 generate_html_report.py trivy-reports/frontend-report.json trivy-reports/frontend-report.html "Frontend Image"

      - name: Create index page for reports
        run: |
          cat > trivy-reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Trivy Security Reports - Build ${{ github.sha }}</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
                  .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
                  .header { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 40px; text-align: center; }
                  .header h1 { font-size: 2.5em; margin-bottom: 10px; }
                  .header p { opacity: 0.9; font-size: 1.1em; }
                  .build-info { background: #e8f4fd; padding: 25px; }
                  .build-info h3 { color: #2c3e50; margin-bottom: 15px; }
                  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
                  .info-item { background: white; padding: 15px; border-radius: 8px; }
                  .info-label { font-weight: bold; color: #34495e; margin-bottom: 5px; }
                  .reports-section { padding: 30px; }
                  .reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
                  .report-card { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 12px; padding: 25px; text-decoration: none; color: inherit; transition: all 0.3s; border: 2px solid transparent; }
                  .report-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: #3498db; }
                  .report-icon { font-size: 3em; margin-bottom: 15px; }
                  .backend-card { border-left: 5px solid #e74c3c; }
                  .frontend-card { border-left: 5px solid #3498db; }
                  .report-title { font-size: 1.3em; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
                  .report-desc { color: #7f8c8d; line-height: 1.5; }
                  .footer { background: #2c3e50; color: white; text-align: center; padding: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🛡️ Trivy Security Reports</h1>
                      <p>Comprehensive vulnerability analysis for your Docker images</p>
                  </div>
                  
                  <div class="build-info">
                      <h3>📊 Build Information</h3>
                      <div class="info-grid">
                          <div class="info-item">
                              <div class="info-label">Build SHA</div>
                              <div>${{ github.sha }}</div>
                          </div>
                          <div class="info-item">
                              <div class="info-label">Repository</div>
                              <div>${{ github.repository }}</div>
                          </div>
                          <div class="info-item">
                              <div class="info-label">Generated</div>
                              <div>$(date)</div>
                          </div>
                          <div class="info-item">
                              <div class="info-label">Scanner</div>
                              <div>Trivy Security Scanner</div>
                          </div>
                      </div>
                  </div>
                  
                  <div class="reports-section">
                      <h2>📈 Available Security Reports</h2>
                      <div class="reports-grid">
                          <a href="backend-report.html" class="report-card backend-card">
                              <div class="report-icon">💻</div>
                              <div class="report-title">Backend Image Security Report</div>
                              <div class="report-desc">Detailed vulnerability analysis for the backend Docker image including OS packages and application dependencies.</div>
                          </a>
                          <a href="frontend-report.html" class="report-card frontend-card">
                              <div class="report-icon">🌐</div>
                              <div class="report-title">Frontend Image Security Report</div>
                              <div class="report-desc">Comprehensive security scan for the frontend Docker image covering all installed packages and libraries.</div>
                          </a>
                      </div>
                  </div>
                  
                  <div class="footer">
                      <p>Generated by Trivy Security Scanner | Automated CI/CD Pipeline</p>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_dir: ./trivy-reports
          destination_dir: reports/${{ github.sha }}

      - name: Output report URLs
        run: |
          echo "📊 Trivy Security Reports Available:"
          echo "🔗 Main Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/"
          echo "🔗 Backend Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/backend-report.html"
          echo "🔗 Frontend Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.sha }}/frontend-report.html"


