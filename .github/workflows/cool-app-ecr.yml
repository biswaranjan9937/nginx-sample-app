name: Build and Push Cool App Images

on:
  push:
    branches:
      - main
    paths:
      - "cool-app/backend/server.js"
      - "cool-app/backend/Dockerfile"
      - "cool-app/frontend/vite.config.js"
      - "cool-app/frontend/index.html"
      - "cool-app/frontend/Dockerfile" 
      - "cool-app/frontend/src/main.jsx"
      - "cool-app/frontend/src/App.jsx" 
      - "cool-app/frontend/src/styles.css"
      - ".github/workflows/cool-app-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
  ECR_BACKEND_REPO: ${{ vars.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ vars.ECR_FRONTEND_REPO }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in AWS_REGION ROLE_TO_ASSUME ECR_BACKEND_REPO ECR_FRONTEND_REPO; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required repo variable: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Set repository variables in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in "$ECR_BACKEND_REPO" "$ECR_FRONTEND_REPO"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Build and push backend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ./cool-app/backend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ./cool-app/frontend
          docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }} ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:latest

      - name: Update deployment manifests
        run: |
          # Update backend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}|g" deployment.yaml
          
          # Update frontend image (handles both with and without existing tags)
          sed -i "s|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}.*|image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}|g" deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add deployment.yaml
          git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
          git push


