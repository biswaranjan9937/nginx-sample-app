name: Build and Push Cool App Images

on:
  push:
    branches:
      - main
    paths:
      - "cool-app/**"
      - ".github/workflows/cool-app-ecr.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ROLE_TO_ASSUME: arn:aws:iam::793524670633:role/Terraform-deployer-role
  ECR_BACKEND_REPO: backend_repo
  ECR_FRONTEND_REPO: frontend_repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for v in AWS_REGION ROLE_TO_ASSUME ECR_BACKEND_REPO ECR_FRONTEND_REPO; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required repo variable: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Set repository variables in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          for repo in "$ECR_BACKEND_REPO" "$ECR_FRONTEND_REPO"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./cool-app/backend
          file: ./cool-app/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./cool-app/frontend
          file: ./cool-app/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest

